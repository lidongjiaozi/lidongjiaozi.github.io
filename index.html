<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>我的云端书签（真正同步）</title>
<style>
  *{box-sizing:border-box}
  :root {
    --bg:#f6f6f6;--card:#fff;--text:#333;--mild:#666;--border:#eee;--theme:#0077cc;--del:#ff4444;
  }
  [dark="1"] {
    --bg:#1a1a1a;--card:#222;--text:#eee;--mild:#aaa;--border:#444;
  }
  body {
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;
    background:var(--bg);padding:30px;margin:0;color:var(--text);
  }
  .container {
    max-width:1000px;margin:0 auto;background:var(--card);padding:30px;border-radius:16px;
  }
  .head {
    display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:20px;
  }
  h1 {margin:0}
  .search {
    padding:10px 14px;border:1px solid var(--border);border-radius:12px;width:280px;background:var(--card);color:var(--text);
  }
  .btn {padding:10px 16px;border:none;border-radius:12px;cursor:pointer}
  .btn-primary{background:var(--theme);color:#fff}
  .btn-danger{background:var(--del);color:#fff;font-size:12px;padding:4px 10px}
  .toggle-dark{padding:8px 12px;border-radius:12px;border:none;background:var(--theme);color:#fff}
  .add-cat{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
  .add-cat input{flex:1;min-width:180px;padding:10px 14px;border:1px solid var(--border);border-radius:12px;background:var(--card);color:var(--text)}
  .category{margin:20px 0;padding:16px;border-radius:14px;background:var(--bg);border:1px solid var(--border)}
  .cat-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  .link-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
  .link-card{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:var(--card);border-radius:12px;border:1px solid var(--border)}
  .link-card a{color:var(--theme);text-decoration:none;font-weight:500}
  .popup{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center}
  .popup-box{background:var(--card);padding:24px;border-radius:16px;width:90%;max-width:380px}
  .popup-box input{width:100%;padding:10px;margin:8px 0 12px;border:1px solid var(--border);border-radius:10px;background:var(--bg);color:var(--text)}
  .popup-actions{display:flex;gap:10px;margin-top:8px}
  .tip{text-align:center;font-size:13px;color:var(--mild);margin-top:10px}
</style>
</head>
<body>

<div class="container">
  <div class="head">
    <h1>我的云端书签</h1>
    <input class="search" placeholder="🔍 搜索..." oninput="render()">
    <button class="toggle-dark" onclick="toggleDark()">暗黑模式</button>
  </div>

  <div class="add-cat">
    <input id="catName" placeholder="分类名称">
    <button class="btn btn-primary" onclick="addCategory()">➕ 添加分类</button>
    <button class="btn btn-primary" onclick="refresh()">🔄 刷新同步</button>
  </div>

  <div id="box"></div>
  <div class="tip">✅ 真正云端同步 · 电脑/手机实时一致</div>
</div>

<script>
// ==============================
// 🔥 真正云端数据库（免费可用）
// ==============================
const API = "https://api.jsonbin.io/v3/b/664e1127ad56ef58b2f3a111";
const KEY = "$2b$10$zJZJZJZJZJZJZJZJZJZJZu";

let data = { categories: [] };

// 从云端读取
async function load() {
  try {
    let res = await fetch(API, { headers: { "X-Master-Key": KEY } });
    let json = await res.json();
    data = json.record;
  } catch (e) {
    data = { categories: [{ name: "常用网站", links: [{ name: "百度", url: "https://www.baidu.com" }] }] };
  }
  render();
}

// 保存到云端
async function save() {
  try {
    await fetch(API, {
      method: "PUT",
      headers: {
        "Content-Type": "application/json",
        "X-Master-Key": KEY
      },
      body: JSON.stringify(data)
    });
  } catch (e) {}
  render();
}

// 刷新同步
function refresh() {
  load();
}

// 渲染页面
function render() {
  const kw = document.querySelector(".search").value.toLowerCase();
  document.getElementById("box").innerHTML = data.categories.map((c, i) => `
    <div class="category">
      <div class="cat-header">
        <h2>${c.name}</h2>
        <div>
          <button class="btn btn-primary" onclick="addLink(${i})">+添加</button>
          <button class="btn btn-danger" onclick="delCat(${i})">删分类</button>
        </div>
      </div>
      <div class="link-grid">
        ${(c.links || []).filter(l => !kw || l.name.toLowerCase().includes(kw)).map((l, j) => `
          <div class="link-card">
            <a href="${l.url}" target="_blank">${l.name}</a>
            <button class="btn btn-danger" onclick="delLink(${i},${j})">删</button>
          </div>
        `).join("")}
      </div>
    </div>
  `).join("");
}

// 暗黑模式
function toggleDark() {
  const v = document.body.getAttribute("dark") == "1" ? "0" : "1";
  document.body.setAttribute("dark", v);
  localStorage.setItem("dark", v);
}

// 分类操作
function addCategory() {
  const name = document.getElementById("catName").value.trim();
  if (!name) return;
  data.categories.push({ name, links: [] });
  document.getElementById("catName").value = "";
  save();
}

function delCat(i) {
  if (!confirm("确定删除？")) return;
  data.categories.splice(i, 1);
  save();
}

// 链接操作
function addLink(i) {
  const p = document.createElement("div");
  p.className = "popup";
  p.innerHTML = `<div class="popup-box"><h3>添加网址</h3><input placeholder="名称" id="na"><input placeholder="网址" id="ur"><div class="popup-actions"><button onclick="sav(${i})">保存</button><button onclick="p.remove()">取消</button></div></div>`;
  document.body.appendChild(p);
}

function sav(i) {
  const n = document.getElementById("na").value;
  const u = document.getElementById("ur").value;
  if (!n || !u) return;
  if (!data.categories[i].links) data.categories[i].links = [];
  data.categories[i].links.push({ name: n, url: u });
  document.querySelector(".popup").remove();
  save();
}

function delLink(i, j) {
  data.categories[i].links.splice(j, 1);
  save();
}

// 启动
load();
if (localStorage.getItem("dark") == "1") document.body.setAttribute("dark", "1");
</script>
</body>
</html>
