<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>我的云端书签</title>
<style>
  *{box-sizing:border-box}
  :root {
    --bg:#f6f6f6;--card:#fff;--text:#333;--mild:#666;--border:#eee;--theme:#0077cc;--del:#ff4444;
  }
  [dark="1"] {
    --bg:#1a1a1a;--card:#222;--text:#eee;--mild:#aaa;--border:#444;
  }
  body {
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;
    background:var(--bg);padding:30px;margin:0;color:var(--text);transition:.3s;
  }
  .container {
    max-width:1000px;margin:0 auto;background:var(--card);padding:30px;border-radius:16px;box-shadow:0 4px 12px rgba(0,0,0,.05);
  }
  .head {
    display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:20px;
  }
  h1 {margin:0;font-size:26px}
  .search {
    padding:10px 14px;border:1px solid var(--border);border-radius:12px;width:280px;background:var(--card);color:var(--text);
  }
  .btn {padding:10px 16px;border:none;border-radius:12px;cursor:pointer}
  .btn-primary{background:var(--theme);color:#fff}
  .btn-danger{background:var(--del);color:#fff;font-size:12px;padding:4px 10px}
  .toggle-dark{padding:8px 12px;border-radius:12px;border:none;background:var(--theme);color:#fff;cursor:pointer}
  .add-cat{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
  .add-cat input{flex:1;min-width:180px;padding:10px 14px;border:1px solid var(--border);border-radius:12px;background:var(--card);color:var(--text)}
  .category{margin:20px 0;padding:16px;border-radius:14px;background:var(--bg);border:1px solid var(--border)}
  .cat-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  .cat-header h2{margin:0;font-size:18px}
  .link-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
  .link-card{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:var(--card);border-radius:12px;border:1px solid var(--border)}
  .link-card a{color:var(--theme);text-decoration:none;font-weight:500}
  .popup{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:999}
  .popup-box{background:var(--card);padding:24px;border-radius:16px;width:90%;max-width:380px}
  .popup-box input{width:100%;padding:10px;margin:8px 0 12px;border:1px solid var(--border);border-radius:10px;background:var(--bg);color:var(--text)}
  .popup-actions{display:flex;gap:10px;margin-top:8px}
  .popup-actions button{flex:1;padding:10px;border-radius:10px;border:none;background:var(--theme);color:#fff;cursor:pointer}
  .sync-info{text-align:center;font-size:13px;color:var(--mild);margin-top:10px}
</style>
</head>
<body>

<div class="container">
  <div class="head">
    <h1>我的云端书签</h1>
    <input class="search" placeholder="🔍 搜索..." oninput="render()">
    <button class="toggle-dark" onclick="toggleDark()">暗黑模式</button>
  </div>

  <div class="add-cat">
    <input id="catName" placeholder="新分类名称">
    <button class="btn btn-primary" onclick="addCategory()">➕ 添加分类</button>
  </div>

  <div id="container"></div>
  <div class="sync-info">✅ 全自动云端同步 · 电脑/手机实时一致</div>
</div>

<script>
// ==============================================
// 🔥 真正云端同步（所有人看到一模一样）
// ==============================================
let SHARE_URL = "https://raw.githubusercontent.com/lidongjiaozi/lidongjiaozi.github.io/main/data.json";
let data = { categories: [] };

// 读取云端
async function loadData() {
  try {
    let r = await fetch(SHARE_URL);
    data = await r.json();
  } catch(e) {
    data = { categories: [{ name:"常用网站", links:[{name:"百度",url:"https://www.baidu.com"}]}] };
  }
  render();
}

// 保存云端
async function saveData() {
  try {
    await fetch("https://api.github.com/repos/lidongjiaozi/lidongjiaozi.github.io/contents/data.json", {
      method: "PUT",
      headers: { "Accept":"application/vnd.github.v3+json", "Content-Type":"application/json" },
      body: JSON.stringify({
        message: "sync",
        content: btoa(JSON.stringify(data, null, 2))
      })
    });
  } catch(e) {}
}

// 暗黑
function toggleDark() {
  let v = document.body.getAttribute("dark")=="1"?"0":"1";
  document.body.setAttribute("dark",v);
  localStorage.setItem("dark",v);
}

// 渲染
function render() {
  let kw = document.querySelector(".search").value.toLowerCase();
  document.getElementById("container").innerHTML = data.categories.map((c,i)=>`
    <div class="category">
      <div class="cat-header">
        <h2>${c.name}</h2>
        <div>
          <button class="btn btn-primary" onclick="addLink(${i})">+添加</button>
          <button class="btn btn-danger" onclick="delCat(${i})">删分类</button>
        </div>
      </div>
      <div class="link-grid">
        ${c.links?.filter(l=>!kw||l.name.toLowerCase().includes(kw)).map((l,j)=>`
          <div class="link-card">
            <a href="${l.url}" target="_blank">${l.name}</a>
            <button class="btn btn-danger" onclick="delLink(${i},${j})">删</button>
          </div>
        `).join("")}
      </div>
    </div>
  `).join("");
}

// 分类
function addCategory() {
  let n = document.getElementById("catName").value.trim();
  if(!n)return;
  data.categories.push({name:n,links:[]});
  document.getElementById("catName").value="";
  saveData();render();
}
function delCat(i){
  if(!confirm("确定删除？"))return;
  data.categories.splice(i,1);
  saveData();render();
}

// 链接
function addLink(i){
  let p = document.createElement("div");
  p.className="popup";
  p.innerHTML=`<div class="popup-box"><h3>添加网址</h3><input placeholder="名称" id="na"><input placeholder="网址" id="ur"><div class="popup-actions"><button onclick="savLink(${i})">保存</button><button onclick="this.closest('.popup').remove()">取消</button></div></div>`;
  document.body.appendChild(p);
}
function savLink(i){
  let n=document.getElementById("na").value;
  let u=document.getElementById("ur").value;
  if(!n||!u)return;
  data.categories[i].links.push({name:n,url:u});
  document.querySelector(".popup").remove();
  saveData();render();
}
function delLink(i,j){
  data.categories[i].links.splice(j,1);
  saveData();render();
}

// 自动收藏
async function autoAdd(){
  let p=new URLSearchParams(location.search);
  let n=p.get("name"),u=p.get("url");
  if(!n||!u)return;
  await loadData();
  data.categories[0].links.push({name:n,url:u});
  await saveData();
  alert("✅ 已同步云端");
  location.replace(location.pathname);
}

// 启动
if(location.search) autoAdd();
else loadData();
if(localStorage.getItem("dark")=="1") document.body.setAttribute("dark","1");
</script>
</body>
</html>
