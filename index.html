<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>阿里云同步书签</title>
<style>
  *{box-sizing:border-box}
  :root {
    --bg:#f6f6f6;--card:#fff;--text:#333;--mild:#666;--border:#eee;--theme:#0077cc;--del:#ff4444;
  }
  body {
    font-family:"PingFang SC",sans-serif;
    background:var(--bg);padding:30px;margin:0;color:var(--text);
  }
  .container{max-width:1000px;margin:0 auto;background:var(--card);padding:30px;border-radius:16px}
  .head{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:20px}
  h1{margin:0}
  .search{padding:10px 14px;border:1px solid var(--border);border-radius:12px;width:280px}
  .btn{padding:10px 16px;border:none;border-radius:12px;cursor:pointer}
  .btn-primary{background:var(--theme);color:#fff}
  .btn-danger{background:var(--del);color:#fff;font-size:12px;padding:4px 10px}
  .add-cat{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
  .add-cat input{flex:1;min-width:180px;padding:10px 14px;border:1px solid var(--border);border-radius:12px}
  .category{margin:20px 0;padding:16px;border-radius:14px;background:var(--bg);border:1px solid var(--border)}
  .cat-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  .link-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
  .link-card{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:var(--card);border-radius:12px;border:1px solid var(--border)}
  .link-card a{color:var(--theme);text-decoration:none;font-weight:500}
  .popup{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center}
  .popup-box{background:var(--card);padding:24px;border-radius:16px;width:90%;max-width:380px}
  .popup-box input{width:100%;padding:10px;margin:8px 0 12px;border:1px solid var(--border);border-radius:10px}
  .popup-actions{display:flex;gap:10px}
  .tip{text-align:center;font-size:13px;color:var(--mild);margin-top:10px}
</style>
</head>
<body>
<div class="container">
  <div class="head">
    <h1>阿里云同步书签</h1>
    <input class="search" placeholder="🔍 搜索..." oninput="render()">
    <button class="btn btn-primary" onclick="syncFromCloud()">🔄 从云端刷新</button>
  </div>

  <div class="add-cat">
    <input id="catName" placeholder="分类名称">
    <button class="btn btn-primary" onclick="addCategory()">➕ 添加分类</button>
  </div>

  <div id="box"></div>
  <div class="tip">✅ 数据存在阿里云 · 电脑手机实时同步</div>
</div>

<script>
// ============ 阿里云OSS配置（改成你自己的！）============
const OSS_CONFIG = {
  region: "oss-cn-shenzhen",     // 你的地域（如oss-cn-shenzhen）
  bucket: "my-bookmarks-2026",  // 你的Bucket名
  accessKeyId: "LTAI5tMj5cmCZafERdcy8766",
  accessKeySecret: "5lM25U93cx47WsXel4BCVCIiZNdPyu",
  fileName: "bookmarks.json"     // 云端保存的文件名
};
// =========================================================

let data = { categories: [{ name: "常用网站", links: [{ name: "百度", url: "https://www.baidu.com" }] }] };

// 引入阿里云OSS SDK（浏览器版）
(function(){var a=document.createElement("script");a.src="https://gosspublic.alicdn.com/aliyun-oss-sdk-6.18.0.min.js";document.head.appendChild(a);})();

// 等待SDK加载后初始化
async function initOSS(){
  while(!window.OSS)await new Promise(r=>setTimeout(r,100));
  const client=new OSS.Wrapper({
    region:OSS_CONFIG.region,
    accessKeyId:OSS_CONFIG.accessKeyId,
    accessKeySecret:OSS_CONFIG.accessKeySecret,
    bucket:OSS_CONFIG.bucket,
    secure:true
  });
  window.ossClient=client;
  await syncFromCloud();// 打开自动拉云端
}

// 从云端下载
async function syncFromCloud(){
  try{
    const res=await window.ossClient.get(OSS_CONFIG.fileName);
    data=JSON.parse(res.content.toString());
    render();
  }catch(e){
    console.log("云端无文件，用默认数据");
    render();
  }
}

// 保存到云端
async function saveToCloud(){
  try{
    await window.ossClient.put(OSS_CONFIG.fileName,JSON.stringify(data,null,2));
  }catch(e){
    alert("同步失败："+e.message);
  }
}

// 渲染
function render(){
  const kw=document.querySelector(".search").value.toLowerCase();
  document.getElementById("box").innerHTML=data.categories.map((c,i)=>`
    <div class="category">
      <div class="cat-header">
        <h2>${c.name}</h2>
        <div>
          <button class="btn btn-primary" onclick="addLink(${i})">+添加</button>
          <button class="btn btn-danger" onclick="delCat(${i})">删分类</button>
        </div>
      </div>
      <div class="link-grid">
        ${c.links.filter(l=>!kw||l.name.toLowerCase().includes(kw)).map((l,j)=>`
          <div class="link-card">
            <a href="${l.url}" target="_blank">${l.name}</a>
            <button class="btn btn-danger" onclick="delLink(${i},${j})">删</button>
          </div>
        `).join("")}
      </div>
    </div>
  `).join("");
}

// 分类
function addCategory(){
  const name=document.getElementById("catName").value.trim();
  if(!name)return;
  data.categories.push({name,links:[]});
  document.getElementById("catName").value="";
  render();saveToCloud();
}
function delCat(i){
  if(!confirm("确定删除？"))return;
  data.categories.splice(i,1);
  render();saveToCloud();
}

// 链接
function addLink(i){
  const p=document.createElement("div");p.className="popup";
  p.innerHTML=`
  <div class="popup-box">
    <h3>添加网址</h3>
    <input placeholder="名称" id="na">
    <input placeholder="网址" id="ur">
    <div class="popup-actions">
      <button class="btn btn-primary" onclick="saveLink(${i})">保存</button>
      <button class="btn btn-danger" onclick="p.remove()">取消</button>
    </div>
  </div>`;
  document.body.appendChild(p);
}
function saveLink(i){
  const n=document.getElementById("na").value.trim();
  const u=document.getElementById("ur").value.trim();
  if(!n||!u)return;
  data.categories[i].links.push({name:n,url:u});
  document.querySelector(".popup").remove();
  render();saveToCloud();
}
function delLink(i,j){
  data.categories[i].links.splice(j,1);
  render();saveToCloud();
}

// 初始化
initOSS();
</script>
</body>
</html>
